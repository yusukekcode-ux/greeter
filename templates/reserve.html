{% extends "base.html" %}
{% block title %}事前予約{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto mt-10">
  <div class="bg-white rounded-2xl shadow-lg p-8">
    <h1 class="text-2xl font-bold text-center text-blue-700 mb-2">来訪予約</h1>
    <p class="text-center text-gray-500 mb-8">来訪予定日時をご入力ください</p>

    <form
      hx-post="/reserve"
      hx-target="#result"
      hx-swap="innerHTML"
      hx-indicator="#spinner"
      class="space-y-5"
    >
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">お名前 <span class="text-red-500">*</span></label>
        <input
          type="text" name="name" required
          placeholder="山田 太郎"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">ご用件 <span class="text-red-500">*</span></label>
        <select name="purpose" required
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="">選択してください</option>
          <option value="商談・打ち合わせ">商談・打ち合わせ</option>
          <option value="採用面接">採用面接</option>
          <option value="納品・引き取り">納品・引き取り</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">担当者名 <span class="text-red-500">*</span></label>
        <input
          type="text" name="staff_name" required
          placeholder="田中 花子"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">来訪日 <span class="text-red-500">*</span></label>
          <input
            type="date" name="reserved_date" required
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-400"
          >
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">来訪時刻</label>
          <input
            type="time" name="reserved_time"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-400"
          >
        </div>
      </div>
      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors">
        予約する
      </button>
      <div id="spinner" class="htmx-indicator text-center text-gray-400 text-sm">処理中...</div>
    </form>

    <div id="result" class="mt-6"></div>
  </div>
</div>
{% endblock %}
