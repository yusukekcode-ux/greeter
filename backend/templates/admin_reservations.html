{% extends "base.html" %}
{% block title %}予約管理{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">予約管理</h1>

  <div class="bg-white rounded-xl shadow p-6 mb-8">
    <h2 class="font-semibold text-gray-700 mb-4">新規予約を登録</h2>
    <form
      hx-post="/admin/reservations"
      hx-target="#reservation-list"
      hx-swap="innerHTML"
      class="grid grid-cols-2 gap-4"
    >
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">お名前</label>
        <input type="text" name="name" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">担当者名</label>
        <input type="text" name="staff_name" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">ご用件</label>
        <select name="purpose" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="">選択してください</option>
          <option value="商談・打ち合わせ">商談・打ち合わせ</option>
          <option value="採用面接">採用面接</option>
          <option value="納品・引き取り">納品・引き取り</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">来訪日</label>
        <input type="date" name="reserved_date" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">来訪時刻</label>
        <input type="time" name="reserved_time"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>
      <div class="col-span-2">
        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition-colors">
          予約を登録
        </button>
      </div>
    </form>
  </div>

  <h2 class="font-semibold text-gray-700 mb-4">予約一覧</h2>
  <div id="reservation-list">
    {% include "partials/admin_reservation_list.html" %}
  </div>
</div>
{% endblock %}
