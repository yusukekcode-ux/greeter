{% if visitors %}
<div class="space-y-3">
  {% for v in visitors %}
  <div class="bg-white rounded-xl shadow p-5 flex items-center justify-between
    {% if v.status.value == 'called' %}border-l-4 border-yellow-400{% else %}border-l-4 border-blue-300{% endif %}
  ">
    <div class="flex items-center gap-5">
      <div class="text-3xl font-bold text-blue-700 w-16 text-center">
        {{ "%03d" | format(v.ticket_number) }}
      </div>
      <div>
        <p class="font-semibold text-gray-800">{{ v.name }} 様</p>
        <p class="text-sm text-gray-500">{{ v.purpose }}</p>
        <p class="text-sm text-gray-400">担当: {{ v.staff_name }}</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      {% if v.status.value == 'waiting' %}
        <span class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded-full font-medium">待機中</span>
        <button
          hx-post="/admin/call/{{ v.id }}"
          hx-target="#visitors-list"
          hx-swap="innerHTML"
          class="bg-yellow-400 hover:bg-yellow-500 text-white font-semibold px-4 py-2 rounded-lg text-sm transition-colors">
          呼び出す
        </button>
      {% elif v.status.value == 'called' %}
        <span class="text-xs bg-yellow-100 text-yellow-700 px-2 py-1 rounded-full font-medium">呼び出し中</span>
        <button
          hx-post="/admin/done/{{ v.id }}"
          hx-target="#visitors-list"
          hx-swap="innerHTML"
          class="bg-green-500 hover:bg-green-600 text-white font-semibold px-4 py-2 rounded-lg text-sm transition-colors">
          完了
        </button>
      {% endif %}
      <button
        hx-post="/admin/cancel/{{ v.id }}"
        hx-target="#visitors-list"
        hx-swap="innerHTML"
        hx-confirm="キャンセルしますか？"
        class="bg-gray-200 hover:bg-gray-300 text-gray-600 font-semibold px-3 py-2 rounded-lg text-sm transition-colors">
        ✕
      </button>
    </div>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="bg-white rounded-xl shadow p-12 text-center text-gray-400">
  <p class="text-4xl mb-3">🪑</p>
  <p class="text-lg">現在、待機者はいません</p>
</div>
{% endif %}
