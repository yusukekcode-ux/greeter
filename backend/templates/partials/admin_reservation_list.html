{% if reservations %}
<div class="space-y-3">
  {% for r in reservations %}
  <div class="bg-white rounded-xl shadow p-5 flex items-center justify-between border-l-4 border-purple-300">
    <div>
      <p class="font-semibold text-gray-800">{{ r.name }} 様</p>
      <p class="text-sm text-gray-500">
        {{ r.reserved_date.strftime("%Y/%m/%d") }}
        {% if r.reserved_time %}{{ r.reserved_time.strftime("%H:%M") }}{% endif %}
        — {{ r.purpose }} / 担当: {{ r.staff_name }}
      </p>
    </div>
    <button
      hx-post="/admin/reservations/{{ r.id }}/cancel"
      hx-target="#reservation-list"
      hx-swap="innerHTML"
      hx-confirm="この予約をキャンセルしますか？"
      class="bg-gray-200 hover:bg-gray-300 text-gray-600 font-semibold px-3 py-2 rounded-lg text-sm transition-colors">
      キャンセル
    </button>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="bg-white rounded-xl shadow p-12 text-center text-gray-400">
  <p class="text-lg">予約はありません</p>
</div>
{% endif %}
