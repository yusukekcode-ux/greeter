<div class="bg-green-50 border-2 border-green-400 rounded-xl p-6 text-center">
  <p class="text-green-700 font-semibold text-lg mb-2">受付が完了しました</p>
  <p class="text-gray-500 text-sm mb-4">{{ visitor.name }} 様</p>
  <div class="bg-white rounded-xl border border-green-300 py-6 mb-4">
    <p class="text-sm text-gray-400 mb-1">受付番号</p>
    <p class="text-6xl font-bold text-blue-700">{{ "%03d" | format(visitor.ticket_number) }}</p>
  </div>
  <p class="text-sm text-gray-500">番号が呼ばれるまで、お待ちください。</p>
  <button
    onclick="location.reload()"
    class="mt-4 text-blue-600 underline text-sm">
    最初に戻る
  </button>
</div>
