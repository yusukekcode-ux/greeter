<div class="bg-green-50 border-2 border-green-400 rounded-xl p-6 text-center">
  <p class="text-green-700 font-semibold text-lg mb-2">ご予約を承りました</p>
  <p class="text-gray-500 text-sm mb-4">{{ reservation.name }} 様</p>
  <div class="bg-white rounded-xl border border-green-300 py-5 mb-4 space-y-1">
    <p class="text-gray-700">
      {{ reservation.reserved_date.strftime("%Y年%m月%d日") }}
      {% if reservation.reserved_time %}{{ reservation.reserved_time.strftime("%H:%M") }}{% endif %}
    </p>
    <p class="text-sm text-gray-400">{{ reservation.purpose }} / 担当: {{ reservation.staff_name }}</p>
  </div>
  <p class="text-sm text-gray-500">当日は受付の端末で「予約から受付」を選択してください。</p>
  <button
    onclick="location.reload()"
    class="mt-4 text-blue-600 underline text-sm">
    最初に戻る
  </button>
</div>
